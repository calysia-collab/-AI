name: verify

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sasha_test
          POSTGRES_PASSWORD: sasha_test
          POSTGRES_USER: sasha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sasha_test -d sasha_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SASHA_MASTER_KEY: ERERERERERERERERERERERERERERERERERERERERERE=
      SASHA_TEST_DATABASE_SSL: disable
      SASHA_TEST_DATABASE_URL: postgresql://sasha_test:sasha_test@127.0.0.1:5432/sasha_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run postgres:test
      - run: npm audit --audit-level=high

